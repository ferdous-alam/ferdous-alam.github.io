<!DOCTYPE html>
<html>
  <head>
    <title>D3 Force Layout Example</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
  </head>
  <body>
    <svg width="500" height="300"></svg>

    <script>
      // Define the nodes and links
      const nodes = [
        { id: "A", x: 100, y: 100 },
        { id: "B", x: 100, y: 150 },
        { id: "C", x: 100, y: 200 },
        { id: "D", x: 400, y: 100 },
        { id: "E", x: 400, y: 150 },
        { id: "F", x: 400, y: 200 }
      ];

      const links = [
        { source: "A", target: "D" },
        { source: "B", target: "E" },
        { source: "C", target: "F" }
      ];

      // Create the force simulation
      const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id))
        .force("charge", d3.forceManyBody())
        .force("center", d3.forceCenter(250, 150));

      // Draw the links
      const svg = d3.select("svg");

      const link = svg.selectAll("line")
        .data(links)
        .enter()
        .append("line")
        .attr("stroke", "black")
        .attr("stroke-width", 1);

      // Draw the nodes
      const node = svg.selectAll("circle")
        .data(nodes)
        .enter()
        .append("circle")
        .attr("r", 10)
        .attr("fill", "white")
        .attr("stroke", "black")
        .attr("stroke-width", 1);

      // Update the node and link positions on each tick of the simulation
      simulation.on("tick", () => {
        link.attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node.attr("cx", d => d.x)
            .attr("cy", d => d.y);
      });
    </script>
  </body>
</html>
