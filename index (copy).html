<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Network Graph</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <svg width="1200" height="800"></svg>
  <script>
    const svg = d3.select("svg");
    const width = window.innerWidth;
    const height = window.innerHeight;
    
    const nodes = [
      { id: "A", group: 1, text: "AI/ML/RL\nrepresentation learning" },
      { id: "B", group: 1, text: "Systems\nintegration" },
      { id: "C", group: 1, text: "Control\ntheory" },
      { id: "D", group: 2, text: "Smart\nmanufactring" }, 
      { id: "E", group: 2, text: "Autonomous\nrobots" },
      { id: "F", group: 2, text: "Generative\ndesign" },
    ];

    const links = [
      { source: "A", target: "D" },
      { source: "A", target: "E" },
      { source: "A", target: "F" },
      { source: "B", target: "D" }, 
      { source: "B", target: "E" }, 
      { source: "C", target: "D" }, 
      { source: "C", target: "E" }  
    ];

    const color = d3.scaleOrdinal()
      .domain([1, 2])
      .range(["blue", "red"]);

    const simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(d => d.id).distance(100))
      .force("charge", d3.forceManyBody().strength(-500))
      .force("center", d3.forceCenter(200, 200))
      // .force("square", squareForce(300, 250, 100))
      .on("tick", ticked);

    const link = svg.append("g")
      .attr("stroke", "#999")
      .attr("stroke-opacity", 0.6)
      .selectAll("line")
      .data(links)
      .join("line")
      .attr("stroke-width", 2);

    const node = svg.append("g")
      .selectAll("g")
      .data(nodes)
      .join("g")
      .call(drag(simulation));

    node.append("circle")
      .attr("r", 20)
      .attr("fill", d => color(d.group))
      .style("fill-opacity","0.25")
      .attr("stroke", "#fff")
      .attr("stroke-width", 0);

    node.append("text")
      .attr("text-anchor", "middle")
      .selectAll("tspan")
      .data(d => d.text.split("\n"))
      .join("tspan")
      .attr("x", 0)
      .attr("y", (d, i, nodes) => `${(i - nodes.length / 2 + 0.5) * 12}px`)
      .text(d => d);

    function ticked() {
      link.attr("x1", d => d.source.x)
          .attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x)
          .attr("y2", d => d.target.y);

      node.attr("transform", d => `translate(${d.x},${d.y})`);
    }

    function drag(simulation) {
      function dragstarted(event, d) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x;
        d.fy = d.y;
      }

      function dragged(event, d) {
        d.fx = event.x;
        d.fy = event.y;
      }

      function dragended(event, d) {
        if (!event.active) simulation.alphaTarget(0);
        d.fx = null;
        d.fy = null;
      }

      return d3.drag()
          .on("start", dragstarted)
          .on("drag", dragged)
          .on("end", dragended);
    }

      // Define a custom force to pull the nodes towards a square formation
    function squareForce(x, y, radius) {
      return (alpha) => {
        for (const node of nodes) {
          const dx = x - node.x;
          const dy = y - node.y;
          const distance = Math.sqrt(dx * dx + dy * dy);
          const targetDistance = distance < radius ? radius : distance;
          node.vx += dx / distance * targetDistance * alpha;
          node.vy += dy / distance * targetDistance * alpha;
        }
      }
      }
    </script>
  </body>
</html>
