<html>
	<head>
		<script src="https://d3js.org/d3.v4.min.js"></script>
        <style>
            
            label {
                font: "Helvetica Neue", Helvetica, Arial, sans-serif;
                
                }

          .node:hover {
              cursor: pointer;
          }
        </style>

	</head>

<body>
	<div id="networkGraph"></div>

</body>

<script>
var nodes = [
      { id: "A", label: "AI/ML systems integration" },
      { id: "B", label: "Representation Learning" },
      { id: "C", label: "Unified approach for transfer learning in RL" },
      { id: "D", label: "Hardware" },
      { id: "E", label: "Software" }, 
      { id: "F", label: "High dimensional robotics" }, 
      { id: "G", label: "Sequential design" }, 
      { id: "H", label: "Autonomous Manufacturing System" },       
  ];
  
var links = [
      { source: "A", target: "B" },
      { source: "B", target: "C" },
      { source: "A", target: "C" },
      { source: "A", target: "D" },
      { source: "A", target: "E" },
      { source: "C", target: "F" }, 
      { source: "B", target: "G" }, 
      { source: "A", target: "H" }, 
      { source: "H", target: "D" },
      { source: "H", target: "E" },  
    ];


function blogGraph(graph) {

        const width = window.innerWidth;
        const height = window.innerHeight;

        const sourceRadius = 25;
        const entityRadius = 50;
        const linkdistance = 200;

        var svg = d3.select("#networkGraph")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        var simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(function(d) { return d.id; })
              .distance(linkdistance)
              // .strength(1)            
            )
            .force('charge', d3.forceManyBody()
              .strength(-700)
              .theta(3.0)
              .distanceMax(1500)
            )
            .force('collision', d3.forceCollide().radius(function(d) {
                    return d.radius
                  }))
        	.force("center", d3.forceCenter(document.querySelector("#networkGraph").clientWidth / 2, document.querySelector("#networkGraph").clientHeight / 2));

        var defs = svg.append("defs");

        defs.append("radialGradient")
            .attr("id", "entity-gradient")
            .attr("cx", "50%") 
            .attr("cy", "50%") 
            .attr("r", "50%") 
            .selectAll("stop")
            .data([
                    {offset: "50%", color: "#ffffff"},
                    {offset: "100%", color: "#CCCCCC"},
                ])
            .enter().append("stop")
            .attr("offset", function(d) { return d.offset; })
            .attr("stop-color", function(d) { return d.color; });

        defs.append("radialGradient")
            .attr("id", "source-gradient")
            .selectAll("stop")
            .data([
                    {offset: "20%", color: "#eda515"},
                    {offset: "100%", color: "#827777"},
                ])
            .enter().append("stop")
            .attr("offset", function(d) { return d.offset; })
            .attr("stop-color", function(d) { return d.color; });

         
        var link = svg.append("g")
            .selectAll("line")
            .data(links)
            .enter().append("line")
            .attr("stroke", "skyblue")
            .attr("stroke-width", 5);

        link
        	.style("stroke", "#aaa");

        var node = svg.append("g")
            .attr("class", "nodes")
            .call(d3.drag() // Enable drag behavior
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended))
            .selectAll("circle")
            .data(nodes)
            .enter().append("circle")
        			//I made the article/source nodes larger than attribute nodes
                .attr("r", function(d){return d.category==0 ? sourceRadius : entityRadius})
            .on("click", clicked); // Handle click event
;
            

        node
            .style("fill", "#cccccc")
            .style("fill-opacity","0.9")
            .style("stroke", "#424242")
            .style("stroke-width", "1px");

        node
            .style("fill", function(d){return d.category==0 ? "url(#source-gradient)" : "url(#entity-gradient)"});        

        var label = svg.append("g")
            .attr("class", "labels")
            .selectAll("text")
            .data(nodes)
            .enter().append("text")
            .text(function(d) { return d.label; })
            .attr("class", "label");
            
        label
            .style("text-anchor", "middle")
            // .style("font-size", function(d) {return d.category == 1 ? Math.min(2 * entityRadius, (2 * entityRadius - 8) / this.getComputedTextLength() * 15) + "px" : Math.min(2 * sourceRadius, (2 * sourceRadius - 8) / this.getComputedTextLength() * 50) + "px"; });
            .style("font-size", 15);

        label 
            .on("mouseover", function(d){
                        tooltip.html(`${d.label}`); 
                        return tooltip.style("visibility", "visible");})
            .on("mousemove", function(){
                return tooltip.style("top", (d3.event.pageY-10)+"px").style("left",(d3.event.pageX+10)+"px");})


        node
            .on("mouseover", function(d){
                        tooltip.html(`${d.label}`); 
                        return tooltip.style("visibility", "visible");})
            .on("mousemove", function(){
                return tooltip.style("top", (d3.event.pageY-10)+"px").style("left",(d3.event.pageX+10)+"px");})
            .on("mouseout", function(){return tooltip.style("visibility", "hidden");});

               
        simulation
            .nodes(nodes)
            .on("tick", ticked);

        simulation.force("link")
            .links(links);

        function clicked(d) {
            // Navigate to another page when node is clicked
            window.location.href = "https://example.com/" + d.id;
            }

                
        function dragstarted(d) {
            if (!d3.event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
        }

        function dragged(d) {
            d.fx = d3.event.x;
            d.fy = d3.event.y;
        }

        function dragended(d) {
            if (!d3.event.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
        }
  
        function ticked() {
            link
                .attr("x1", function(d) { return d.source.x; })
                .attr("y1", function(d) { return d.source.y; })
                .attr("x2", function(d) { return d.target.x; })
                .attr("y2", function(d) { return d.target.y; });

            node
                 .attr("cx", function (d) { return d.x+5; })
                 .attr("cy", function(d) { return d.y-3; });
            
            label
                .attr("x", function(d) { return d.x; })
                .attr("y", function (d) { return d.y; });

            }

        var tooltip = d3.select("body")
            .append("div")
            .style("position", "absolute")
            .style("visibility", "hidden")
            .style("color", "white")
            .style("padding", "8px")
            .style("background-color", "#626D71")
            .style("border-radius", "6px")
            .style("text-align", "center")
            .style("width", "auto")
            .text("");
        
}
 
    var graphUrl = ''; //filepath or url for your data goes here
    d3.json(graphUrl,function(error,data){
          blogGraph(data)
        });

</script>

</html>
